<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KONECTO — Ofertas y Demandas</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="ofertas_demandas.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">KONECTO</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="../dashboard/index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="../login/index.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Ofertas y Demandas</a></li>
                    <li class="nav-item"><a class="nav-link" href="../usuarios/index.html">Altas Usuarios</a></li>
                </ul>
                <div class="navbar-text text-white">
                    <span id="usuarioActivo">-no login-</span>
                    <a href="#" id="logoutButton" class="ms-2 d-none">(salir)</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="form-empleos shadow">
                    <div class="form-empleos-header"><h2>NUEVA PUBLICACIÓN</h2></div>
                    <div class="form-empleos-body">
                        <form id="formEmpleos">
                            <div class="mb-3">
                                <label class="form-label">¿Qué deseas publicar?</label>
                                <select id="tipo" class="form-select" required>
                                    <option value="" disabled selected>Selecciona una opción...</option>
                                    <option value="Oferta">Oferta de Empleo</option>
                                    <option value="Demanda">Demanda de Empleo</option>
                                </select>
                            </div>

                            <div id="camposDinamicos" class="d-none">
                                <div class="mb-3">
                                    <label class="form-label" id="labelTitulo">Título</label>
                                    <input type="text" id="titulo" class="form-control" required>
                                </div>

                                <div class="row">
                                    <div class="col-12 mb-3">
                                        <label class="form-label">Fecha de Publicación</label>
                                        <input type="date" id="fechaPublicacion" class="form-control" required>
                                    </div>
                                    <div class="col-6 mb-3">
                                        <label class="form-label">Jornada Laboral</label>
                                        <select id="jornada" class="form-select">
                                            <option value="Completa">Completa</option>
                                            <option value="Parcial">Parcial</option>
                                        </select>
                                    </div>
                                    <div class="col-6 mb-3 d-none" id="grupoSueldo">
                                        <label class="form-label">Sueldo Anual (€)</label>
                                        <input type="number" id="sueldo" class="form-control">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Descripción</label>
                                    <textarea id="descripcion" class="form-control" rows="3" required></textarea>
                                </div>

                                <button type="submit" class="btn-alta">PUBLICAR</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="tabla-empleos-wrapper h-100 shadow">
                    <div class="tabla-empleos-header">ESTADÍSTICAS REALES</div>
                    <div class="tabla-empleos-body d-flex flex-column align-items-center justify-content-center h-100">
                        <canvas id="graficoCanvas" width="280" height="180"></canvas>
                        <div class="leyenda-grafico">
                            <span class="color-oferta">● OFERTAS</span>
                            <span class="ms-4 color-demanda">● DEMANDAS</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 mb-5">
                <div class="tabla-empleos-wrapper shadow">
                    <div class="tabla-empleos-header">LISTADO DE PUBLICACIONES</div>
                    <div class="tabla-empleos-body">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>DETALLES ACTIVIDAD</th>
                                    <th>CONTACTO</th>
                                    <th>FECHA PUBLICACION</th>
                                    <th>MODALIDAD</th>
                                    <th>ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody id="tablaEmpleosBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="ofertas_demandas.js"></script>
</body>
</html>
